<%@ page language="java" contentType="text/html; charset=UTF-8" pageEncoding="UTF-8"%>
<%@ taglib prefix="c" uri="jakarta.tags.core" %>

<html>
<head>
    <meta charset="UTF-8">
    <title>Add Medical Record - ProjectMASS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .section-title {
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            color: #0d6efd;
            font-size: 1.25rem;
        }
    </style>
</head>
<body class="bg-light">

<!-- Assuming you have a header.jsp to include -->
jsp:include page="header.jsp" />

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
            <div class="card shadow border-0 rounded-3">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0"><i class="bi bi-file-earmark-medical-fill me-2"></i>Add Medical Record</h4>
                </div>
                <div class="card-body p-4 p-md-5">

                    <!-- Submits to your Servlet handling the creation (e.g., AddRecordServlet) -->
                    <form action="saveMedicalRecord" method="POST">

                        <!-- Identity Section -->
                        <h5 class="section-title"><i class="bi bi-person-badge me-2"></i>Patient Identity</h5>
                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label fw-bold text-secondary">Patient ID <span class="text-danger">*</span></label>
                                <input type="text" name="patientId" class="form-control" placeholder="e.g. PAT-1001" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-secondary">Full Name <span class="text-danger">*</span></label>
                                <input type="text" name="fullName" class="form-control" placeholder="John Doe" required>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-4 mb-3 mb-md-0">
                                <label class="form-label fw-bold text-secondary">Age</label>
                                <input type="number" name="age" class="form-control" placeholder="e.g. 35">
                            </div>
                            <div class="col-md-4 mb-3 mb-md-0">
                                <label class="form-label fw-bold text-secondary">Gender</label>
                                <select name="gender" class="form-select">
                                    <option value="" disabled selected>Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold text-secondary">Blood Group</label>
                                <select name="bloodGroup" class="form-select">
                                    <option value="" disabled selected>Select Group</option>
                                    <option value="A+">A+</option>
                                    <option value="A-">A-</option>
                                    <option value="B+">B+</option>
                                    <option value="B-">B-</option>
                                    <option value="AB+">AB+</option>
                                    <option value="AB-">AB-</option>
                                    <option value="O+">O+</option>
                                    <option value="O-">O-</option>
                                </select>
                            </div>
                        </div>

                        <!-- Clinical Details Section -->
                        <h5 class="section-title mt-4"><i class="bi bi-clipboard2-pulse me-2"></i>Clinical & Vitals</h5>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">Diagnosis</label>
                            <input type="text" name="diagnosis" class="form-control" placeholder="e.g. Viral Infection">
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label fw-bold text-secondary">Blood Pressure (mmHg)</label>
                                <input type="text" name="bloodPressure" class="form-control" placeholder="e.g. 120/80">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-secondary">Heart Rate (BPM)</label>
                                <input type="number" name="heartRate" class="form-control" placeholder="e.g. 72">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-secondary">Doctor's Notes</label>
                            <textarea name="doctorNotes" class="form-control" rows="4" placeholder="Enter clinical observations here..."></textarea>
                        </div>

                        <!-- Actions -->
                        <div class="d-flex justify-content-between mt-5">
                            <a href="doctorDashboard" class="btn btn-outline-secondary px-4 py-2">
                                <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
                            </a>
                            <button type="submit" class="btn btn-primary px-5 py-2 fw-bold">
                                <i class="bi bi-floppy me-2"></i>Save Record
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
